services:
  postgres:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - 6379:6379
    command: redis-server --requirepass ${REDIS_PASSWORD}


  gateway:
    build: ./gateway
    volumes:
      - ./gateway:/app          
      - ./shared:/app/shared   
    env_file:
      - .env                   
    environment:
      - CONFIG_PATH=/app/shared/config/config.yaml
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  core:
    build: ./core
    volumes:
      - ./core:/app
      - ./shared:/app/shared
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/app/shared/config/config.yaml
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data: